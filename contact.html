<!DOCTYPE html>
<html lang="en" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaVerse | Contact Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { 'manga-primary': '#9333ea' } } } }
    </script>
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="antialiased bg-gray-50 dark:bg-gray-950 flex flex-col min-h-screen">
    <div id="header-container"></div>
    
    <main class="pb-16 flex-grow relative">
        <!-- Contact Hero -->
        <section class="hero-gradient relative overflow-hidden py-24 mb-12 text-center">
            <div class="container mx-auto px-4 relative z-10 slide-down">
                <h1 class="text-5xl font-extrabold tracking-tight text-gray-900 dark:text-white">Get in <span class="text-manga-primary">Touch</span></h1>
                <p class="text-xl text-gray-600 dark:text-gray-400 max-w-2xl mx-auto mt-4">Have a question about a project, a DMCA request, or just want to chat? Send us a message.</p>
            </div>
            <div class="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 rounded-full bg-purple-500 opacity-20 blur-3xl"></div>
            <div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-64 h-64 rounded-full bg-purple-800 opacity-20 blur-3xl"></div>
        </section>

        <!-- Abstract Decoration -->
        <div class="absolute top-0 right-0 w-96 h-96 bg-purple-500 rounded-full mix-blend-multiply filter blur-[100px] opacity-20 dark:opacity-40 animate-pulse pointer-events-none"></div>

        <div class="container mx-auto px-4 max-w-6xl space-y-12 relative z-10">

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Contact Info Cards -->
                <div class="lg:col-span-1 space-y-4 fade-up stagger-1">
                    <div class="glass-panel p-6 rounded-2xl border border-white/20 dark:border-gray-800 hover-lift">
                        <div class="w-12 h-12 bg-purple-100 dark:bg-purple-900/30 text-manga-primary rounded-xl flex items-center justify-center text-2xl mb-4">📧</div>
                        <h3 class="text-lg font-bold mb-1">Email us</h3>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mb-2">Our team is here to help.</p>
                        <p class="font-semibold text-manga-primary">support@mangaverse.app</p>
                    </div>

                    <div class="glass-panel p-6 rounded-2xl border border-white/20 dark:border-gray-800 hover-lift">
                        <div class="w-12 h-12 bg-blue-100 dark:bg-blue-900/30 text-blue-600 rounded-xl flex items-center justify-center text-2xl mb-4">💬</div>
                        <h3 class="text-lg font-bold mb-1">Discord Community</h3>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mb-2">Join over 10k members.</p>
                        <p class="font-semibold text-blue-600">discord.gg/mangaverse</p>
                    </div>

                    <div class="glass-panel p-6 rounded-2xl border border-white/20 dark:border-gray-800 hover-lift">
                        <div class="w-12 h-12 bg-green-100 dark:bg-green-900/30 text-green-600 rounded-xl flex items-center justify-center text-2xl mb-4">📍</div>
                        <h3 class="text-lg font-bold mb-1">Office</h3>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mb-2">Global Headquarters.</p>
                        <p class="font-semibold text-green-600">Remote - Global</p>
                    </div>
                </div>

                <!-- Form Section -->
                <div class="lg:col-span-2 fade-up stagger-2">
                    <div class="glass-panel p-8 md:p-10 rounded-3xl border border-white/20 dark:border-gray-800 shadow-xl h-full">
                        <form class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">First Name</label>
                                    <input type="text" class="form-control w-full rounded-xl p-4 bg-white/50 dark:bg-gray-900 border border-gray-200 dark:border-gray-800 focus:ring-2 focus:ring-manga-primary transition-all outline-none" placeholder="John">
                                </div>
                                <div class="space-y-2">
                                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">Last Name</label>
                                    <input type="text" class="form-control w-full rounded-xl p-4 bg-white/50 dark:bg-gray-900 border border-gray-200 dark:border-gray-800 focus:ring-2 focus:ring-manga-primary transition-all outline-none" placeholder="Doe">
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">Email Address</label>
                                <input type="email" class="form-control w-full rounded-xl p-4 bg-white/50 dark:bg-gray-900 border border-gray-200 dark:border-gray-800 focus:ring-2 focus:ring-manga-primary transition-all outline-none" placeholder="john@example.com">
                            </div>
                            <div class="space-y-2">
                                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">Message</label>
                                <textarea rows="4" class="form-control w-full rounded-xl p-4 bg-white/50 dark:bg-gray-900 border border-gray-200 dark:border-gray-800 focus:ring-2 focus:ring-manga-primary transition-all outline-none resize-none" placeholder="Tell us how we can help..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-full py-4 rounded-xl text-lg font-bold shadow-manga hover-lift transition-all">
                                Send Message
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Map Section -->
            <div class="w-full h-96 rounded-3xl overflow-hidden glass-panel border border-white/20 dark:border-gray-800 shadow-lg fade-up stagger-3">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d158857.7281066703!2d-0.24168153701090517!3d51.5287718408761!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47d8a00baf21de75%3A0x52963a5addd52a99!2sLondon!5e0!3m2!1sen!2suk!4v1710000000000!5m2!1sen!2suk" 
                    width="100%" 
                    height="100%" 
                    style="border:0; filter: grayscale(1) invert(1) contrast(0.9) brightness(0.9);" 
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade"
                    class="dark:opacity-80">
                </iframe>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <script src="assets/js/main.js?v=3"></script>
    <script src="assets/js/animations.js"></script>
</body>
</html>

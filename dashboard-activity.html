<!DOCTYPE html>
<html lang="en" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaVerse | Activity Feed</title>
    <link rel="icon" type="image/png" href="assets/logo.png?v=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { 'manga-primary': '#9333ea' } } } }
    </script>
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="assets/css/dark-mode.css" rel="stylesheet">
    <link href="assets/css/rtl.css" rel="stylesheet">
</head>
<body class="antialiased bg-gray-50 dark:bg-gray-950 overflow-hidden">
    <!-- Navbar (Static for sub-pages) -->
        <nav class="manga-nav fixed top-0 w-full z-50 h-20 md:h-24 flex items-center justify-between px-4 sm:px-6">
        <div class="flex items-center gap-4">
            <button id="sidebar-toggle" class="p-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-manga-primary/10 rounded-lg md:hidden">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <a href="index.html" class="flex items-center gap-3 group">
                <img src="assets/logo.png?v=14" alt="MangaVerse Logo" class="h-14 md:h-18 lg:h-20 w-auto max-w-[280px] lg:max-w-[280px] object-contain group-hover:rotate-3 transition-transform">
                <span class="text-xl md:text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-400 hidden min-[450px]:block">Workspace</span>
            </a>
        </div>
        <div class="flex items-center gap-2 md:gap-4">
            <select id="test-role-selector" class="form-control text-[10px] md:text-xs rounded-lg bg-gray-100 dark:bg-gray-800 border-none px-2 md:px-3 py-1 md:py-1.5 outline-none font-medium max-w-[80px] md:max-w-none">
                <option value="reader">Reader</option>
                <option value="translator">Translator</option>
                <option value="editor">Editor</option>
                <option value="admin">Admin</option>
            </select>
            <button id="theme-toggle" class="p-1.5 md:p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">☀️</button>
            <button id="rtl-toggle" class="hidden sm:block px-3 py-1.5 text-xs font-bold rounded-lg bg-gray-100 dark:bg-gray-800 hover:bg-manga-primary hover:text-white transition-all">RTL</button>
            <div class="flex items-center gap-3 border-s border-gray-200 dark:border-gray-800 ps-4">
                <img src="https://i.pravatar.cc/150?img=33" alt="Profile" class="w-8 h-8 rounded-full border border-manga-primary/50">
                <span class="text-sm font-semibold hidden sm:block text-gray-700 dark:text-gray-200" id="current-role-display">User</span>
            </div>
        </div>
    </nav>

    <div class="flex h-screen pt-20 md:pt-24 relative overflow-hidden text-sm">
        <div id="sidebar-placeholder" class="contents"></div>

        <main class="flex-1 overflow-y-auto p-4 sm:p-8 bg-gray-50 dark:bg-gray-950">
            <div class="max-w-3xl mx-auto">
                <div class="mb-8">
                    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Activity Feed</h1>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Track all updates and tasks in your workspace.</p>
                </div>
            <div class="space-y-6">
                <!-- Date Header -->
                <div class="flex items-center gap-4">
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-widest whitespace-nowrap">Today</span>
                    <div class="h-px bg-gray-200 dark:bg-gray-800 w-full"></div>
                </div>

                <!-- Activity Card -->
                <div class="glass-panel p-4 rounded-xl flex gap-4 hover-lift">
                    <div class="w-10 h-10 rounded-full bg-purple-100 dark:bg-purple-900/30 text-manga-primary flex items-center justify-center shrink-0">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10"></path></svg>
                    </div>
                    <div>
                        <p class="text-sm text-gray-900 dark:text-white"><span class="font-bold">You</span> uploaded <span class="text-manga-primary font-bold">Chapter 45</span> of <span class="font-medium italic">Solo Leveling</span></p>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">2 hours ago</p>
                    </div>
                </div>

                <div class="glass-panel p-4 rounded-xl flex gap-4 hover-lift">
                    <div class="w-10 h-10 rounded-full bg-green-100 dark:bg-green-900/30 text-green-500 flex items-center justify-center shrink-0">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div>
                        <p class="text-sm text-gray-900 dark:text-white"><span class="font-bold text-blue-500">Sarah (Editor)</span> approved <span class="font-bold">Chapter 22</span> translations</p>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">5 hours ago</p>
                    </div>
                </div>

                <!-- Yesterday -->
                <div class="flex items-center gap-4 mt-8">
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-widest whitespace-nowrap">Yesterday</span>
                    <div class="h-px bg-gray-200 dark:bg-gray-800 w-full"></div>
                </div>

                <div class="glass-panel p-4 rounded-xl flex gap-4 hover-lift opacity-80">
                    <div class="w-10 h-10 rounded-full bg-yellow-100 dark:bg-yellow-900/30 text-yellow-500 flex items-center justify-center shrink-0">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                    </div>
                    <div>
                        <p class="text-sm text-gray-900 dark:text-white">New community comment on <span class="font-bold">Project Orion</span></p>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">1 day ago</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

        <!-- Mobile Sidebar Overlay (Matches dashboard.html) -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden transition-opacity duration-300 opacity-0"></div>
    </div>

    <!-- Shared JS -->
    <script src="assets/js/main.js?v=3"></script>
    <script src="assets/js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
             // Fetch sidebar and notifications from main dashboard
             fetch('dashboard.html').then(res => res.text()).then(html => {
                 const parser = new DOMParser();
                 const doc = parser.parseFromString(html, 'text/html');
                 
                 // Inject Sidebar
                 const sidebar = doc.querySelector('#dashboard-sidebar');
                 if(sidebar) {
                     sidebar.querySelectorAll('.sidebar-item').forEach(item => {
                         item.classList.remove('bg-manga-primary/10', 'text-manga-primary');
                         if(item.innerText.includes('Activity Feed')) item.classList.add('bg-manga-primary/10', 'text-manga-primary');
                     });
                     document.getElementById('sidebar-placeholder').replaceWith(sidebar);
                 }

                 // Inject Notification Panel
                 const notificationPanel = doc.querySelector('#notification-panel');
                 if(notificationPanel) {
                     document.body.appendChild(notificationPanel);
                 }

                 // Initialize dashboard logic for the newly injected elements
                 if(typeof initSidebar === 'function') initSidebar();
             });
        });
    </script>
</body>
</html>

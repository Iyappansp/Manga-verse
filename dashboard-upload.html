<!DOCTYPE html>
<html lang="en" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaVerse | Upload Chapter</title>
    <link rel="icon" type="image/png" href="assets/logo.png?v=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { 'manga-primary': '#9333ea' } } } }
    </script>
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="assets/css/dark-mode.css" rel="stylesheet">
    <link href="assets/css/rtl.css" rel="stylesheet">
</head>
<body class="antialiased bg-gray-50 dark:bg-gray-950 overflow-hidden">
    <!-- Navbar (Static for sub-pages) -->
        <nav class="manga-nav fixed top-0 w-full z-50 h-20 md:h-24 flex items-center justify-between px-4 sm:px-6">
        <div class="flex items-center gap-4">
            <button id="sidebar-toggle" class="p-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-manga-primary/10 rounded-lg md:hidden">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <a href="index.html" class="flex items-center gap-3 group">
                <img src="assets/logo.png?v=14" alt="MangaVerse Logo" class="h-14 md:h-18 lg:h-20 w-auto max-w-[280px] lg:max-w-[280px] object-contain group-hover:rotate-3 transition-transform">
                <span class="text-xl md:text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-400 hidden min-[450px]:block">Workspace</span>
            </a>
        </div>
        <div class="flex items-center gap-2 md:gap-4">
            <select id="test-role-selector" class="form-control text-[10px] md:text-xs rounded-lg bg-gray-100 dark:bg-gray-800 border-none px-2 md:px-3 py-1 md:py-1.5 outline-none font-medium max-w-[80px] md:max-w-none">
                <option value="reader">Reader</option>
                <option value="translator">Translator</option>
                <option value="editor">Editor</option>
                <option value="admin">Admin</option>
            </select>
            <button id="theme-toggle" class="p-1.5 md:p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">☀️</button>
            <button id="rtl-toggle" class="hidden sm:block px-3 py-1.5 text-xs font-bold rounded-lg bg-gray-100 dark:bg-gray-800 hover:bg-manga-primary hover:text-white transition-all">RTL</button>
            <div class="flex items-center gap-3 border-s border-gray-200 dark:border-gray-800 ps-4">
                <img src="https://i.pravatar.cc/150?img=33" alt="Profile" class="w-8 h-8 rounded-full border border-manga-primary/50">
                <span class="text-sm font-semibold hidden sm:block text-gray-700 dark:text-gray-200" id="current-role-display">User</span>
            </div>
        </div>
    </nav>

    <div class="flex h-screen pt-20 md:pt-24 relative overflow-hidden text-sm">
        <div id="sidebar-placeholder" class="contents"></div>

        <main class="flex-1 overflow-y-auto p-4 sm:p-8 bg-gray-50 dark:bg-gray-950">
            <div class="max-w-4xl mx-auto">
                <div class="mb-8 fade-up text-center">
                    <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Upload New Chapter</h1>
                    <p class="text-gray-500 dark:text-gray-400">Collaborate and grow the community.</p>
                </div>

                <div class="glass-panel p-8 rounded-2xl border border-gray-200 dark:border-gray-800 fade-up">
                    <form class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-gray-700 dark:text-gray-300">Select Project</label>
                                <select class="w-full px-4 py-3 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl outline-none focus:ring-2 focus:ring-manga-primary/50 transition-all text-gray-900 dark:text-white">
                                    <option>Solo Leveling</option>
                                    <option>Omniscient Reader</option>
                                    <option>Tower of God</option>
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-gray-700 dark:text-gray-300">Chapter Number</label>
                                <input type="number" placeholder="e.g. 111" class="w-full px-4 py-3 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl outline-none focus:ring-2 focus:ring-manga-primary/50 transition-all text-gray-900 dark:text-white">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700 dark:text-gray-300">Chapter Title</label>
                            <input type="text" placeholder="Optional" class="w-full px-4 py-3 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl outline-none focus:ring-2 focus:ring-manga-primary/50 transition-all text-gray-900 dark:text-white">
                        </div>

                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700 dark:text-gray-300">Upload Files (Images/PDF)</label>
                            <div class="border-2 border-dashed border-gray-200 dark:border-gray-800 rounded-2xl p-10 text-center hover:border-manga-primary hover:bg-manga-primary/5 transition-all cursor-pointer group">
                                <div class="w-12 h-12 bg-gray-100 dark:bg-gray-800 text-gray-400 group-hover:text-manga-primary rounded-full flex items-center justify-center mx-auto mb-4">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                </div>
                                <p class="text-gray-900 dark:text-white font-bold">Click to upload or drag & drop</p>
                                <p class="text-xs text-gray-500 mt-1">Maximum file size: 50MB (Bulk upload allowed)</p>
                            </div>
                        </div>

                        <button type="submit" class="w-full py-4 bg-manga-primary text-white rounded-xl font-bold shadow-lg shadow-manga-primary/40 hover:opacity-90 active:scale-95 transition-all">Submit for Review</button>
                    </form>
                </div>
            </div>
        </main>

        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden transition-opacity duration-300 opacity-0"></div>
    </div>

    <script src="assets/js/main.js?v=3"></script>
    <script src="assets/js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
             fetch('dashboard.html').then(res => res.text()).then(html => {
                 const parser = new DOMParser();
                 const doc = parser.parseFromString(html, 'text/html');
                 const sidebar = doc.querySelector('#dashboard-sidebar');
                 if(sidebar) {
                     sidebar.querySelectorAll('.sidebar-item').forEach(item => {
                         item.classList.remove('bg-manga-primary/10', 'text-manga-primary');
                         if(item.innerText.includes('Upload Chapter')) item.classList.add('bg-manga-primary/10', 'text-manga-primary');
                     });
                     document.getElementById('sidebar-placeholder').replaceWith(sidebar);
                 }
                 const notificationPanel = doc.querySelector('#notification-panel');
                 if(notificationPanel) document.body.appendChild(notificationPanel);
                 if(typeof initSidebar === 'function') initSidebar();
             });
        });
    </script>
</body>
</html>

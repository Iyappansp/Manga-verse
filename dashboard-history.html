<!DOCTYPE html>
<html lang="en" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaVerse | Reading History</title>
    <link rel="icon" type="image/png" href="assets/logo.png?v=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { 'manga-primary': '#9333ea' } } } }
    </script>
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="assets/css/dark-mode.css" rel="stylesheet">
    <link href="assets/css/rtl.css" rel="stylesheet">
</head>
<body class="antialiased bg-gray-50 dark:bg-gray-950 overflow-hidden">
    <!-- Navbar (Static for sub-pages) -->
    <nav class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 fixed top-0 w-full z-50 h-16 flex items-center justify-between px-4 sm:px-6">
        <div class="flex items-center gap-4">
            <button id="sidebar-toggle" class="p-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg md:hidden">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <a href="index.html" class="flex items-center gap-2 group">
                <img src="assets/logo.png?v=14" alt="MangaVerse Logo" class="h-12 md:h-16 w-auto max-w-[250px] object-contain group-hover:rotate-12 transition-transform shadow-lg shadow-manga-primary/20 rounded-lg">
                <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-400">Workspace</span>
            </a>
        </div>
        
        <div class="flex items-center gap-3">
             <button id="theme-toggle" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1m-16 0H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>
                <svg class="w-5 h-5 hidden dark:block text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
             </button>
             <button id="rtl-toggle" class="px-3 py-1 text-xs font-bold bg-gray-100 dark:bg-gray-800 rounded-lg hover:bg-manga-primary hover:text-white transition-all">RTL</button>
             <div class="w-8 h-8 rounded-full bg-manga-primary/20 flex items-center justify-center">
                 <img src="https://i.pravatar.cc/100" class="w-full h-full rounded-full border border-manga-primary/50" alt="Profile">
             </div>
        </div>
    </nav>

    <div class="flex h-screen pt-16 relative">
        <div id="sidebar-placeholder" class="contents"></div>

        <main class="flex-1 overflow-y-auto p-4 sm:p-8 bg-gray-50 dark:bg-gray-950">
            <div class="max-w-5xl mx-auto">
                <div class="mb-8 fade-up">
                    <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Reading History</h1>
                    <p class="text-gray-500 dark:text-gray-400">Continue where you left off in your journey.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- History Item 1 -->
                    <div class="glass-panel group p-4 rounded-2xl hover-lift">
                        <div class="relative overflow-hidden rounded-xl mb-4 aspect-[3/4]">
                            <img src="assets/Solo Leveling.png" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            <div class="absolute inset-x-0 bottom-0 p-3 bg-gradient-to-t from-black/80 to-transparent">
                                <p class="text-white font-bold text-sm">Ch. 110: The Awakening</p>
                            </div>
                        </div>
                        <h3 class="font-bold text-gray-900 dark:text-white mb-1">Solo Leveling</h3>
                        <div class="flex items-center justify-between text-xs text-gray-500 mb-4">
                            <span>Read 2h ago</span>
                            <span class="text-manga-primary font-bold">85% Read</span>
                        </div>
                        <div class="w-full h-1.5 bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden mb-4">
                            <div class="bg-manga-primary h-full progress-fill" style="width: 85%"></div>
                        </div>
                        <button class="w-full py-2 bg-manga-primary text-white rounded-xl text-sm font-bold shadow-lg shadow-manga-primary/20 hover:opacity-90 transition-all">Continue Reading</button>
                    </div>

                    <!-- History Item 2 -->
                    <div class="glass-panel group p-4 rounded-2xl hover-lift">
                        <div class="relative overflow-hidden rounded-xl mb-4 aspect-[3/4]">
                            <img src="https://images.unsplash.com/photo-1618336753974-aae8e04506aa?auto=format&fit=crop&q=80" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            <div class="absolute inset-x-0 bottom-0 p-3 bg-gradient-to-t from-black/80 to-transparent">
                                <p class="text-white font-bold text-sm">Ch. 45: The Script</p>
                            </div>
                        </div>
                        <h3 class="font-bold text-gray-900 dark:text-white mb-1">Omniscient Reader</h3>
                        <div class="flex items-center justify-between text-xs text-gray-500 mb-4">
                            <span>Read Yesterday</span>
                            <span class="text-manga-primary font-bold">95% Read</span>
                        </div>
                        <div class="w-full h-1.5 bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden mb-4">
                            <div class="bg-manga-primary h-full progress-fill" style="width: 95%"></div>
                        </div>
                        <button class="w-full py-2 bg-manga-primary text-white rounded-xl text-sm font-bold shadow-lg shadow-manga-primary/20 hover:opacity-90 transition-all">Continue Reading</button>
                    </div>

                    <!-- History Item 3 -->
                    <div class="glass-panel group p-4 rounded-2xl hover-lift opacity-80">
                         <div class="relative overflow-hidden rounded-xl mb-4 aspect-[3/4]">
                            <img src="https://images.unsplash.com/photo-1621351183012-e2f9972dd9bf?auto=format&fit=crop&q=80" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            <div class="absolute inset-x-0 bottom-0 p-3 bg-gradient-to-t from-black/80 to-transparent">
                                <p class="text-white font-bold text-sm">Ch. 12: Tower Secrets</p>
                            </div>
                        </div>
                        <h3 class="font-bold text-gray-900 dark:text-white mb-1 text-sm font-bold">Tower of God</h3>
                        <div class="flex items-center justify-between text-xs text-gray-500 mb-4">
                            <span>Read 3 days ago</span>
                            <span class="text-red-500 font-bold">Dropped</span>
                        </div>
                        <div class="w-full h-1.5 bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden mb-4">
                            <div class="bg-red-500 h-full" style="width: 12%"></div>
                        </div>
                        <button class="w-full py-2 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-xl text-sm font-bold hover:bg-manga-primary hover:text-white transition-all">Retry Project</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Sidebar Overlay (Matches dashboard.html) -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden transition-opacity duration-300 opacity-0"></div>
    </div>

    <!-- Shared JS -->
    <script src="assets/js/main.js?v=3"></script>
    <script src="assets/js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
             fetch('dashboard.html').then(res => res.text()).then(html => {
                 const parser = new DOMParser();
                 const doc = parser.parseFromString(html, 'text/html');
                 const sidebar = doc.querySelector('#dashboard-sidebar');
                 if(sidebar) {
                     sidebar.querySelectorAll('.sidebar-item').forEach(item => {
                         item.classList.remove('bg-manga-primary/10', 'text-manga-primary');
                         if(item.innerText.includes('Reading History')) item.classList.add('bg-manga-primary/10', 'text-manga-primary');
                     });
                     document.getElementById('sidebar-placeholder').replaceWith(sidebar);
                 }
                 const notificationPanel = doc.querySelector('#notification-panel');
                 if(notificationPanel) document.body.appendChild(notificationPanel);
                 if(typeof initSidebar === 'function') initSidebar();
             });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaVerse | Register</title>
    <link rel="icon" type="image/png" href="assets/logo.png?v=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { 'manga-primary': '#9333ea' } } } }
    </script>
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="antialiased bg-gray-50 flex flex-col items-center justify-start min-h-screen relative transition-colors py-12 overflow-y-auto" id="login-body">
    
    <!-- Background -->
    <div class="fixed inset-0 z-0">
        <div class="absolute inset-0 bg-gradient-to-br from-indigo-900/90 to-black z-10"></div>
        <img src="https://images.unsplash.com/photo-1541562232579-512a21360020?w=1920" class="w-full h-full object-cover" alt="Background">
    </div>

    <!-- Register Card -->
    <div class="glass-panel w-full max-w-lg p-8 rounded-3xl shadow-2xl z-20 mx-4 border border-white/20 slide-down bg-white/10 dark:bg-black/40 backdrop-blur-xl my-8">
        <div class="text-center mb-6">
            <a href="index.html" class="inline-flex items-center gap-2 text-2xl font-bold tracking-tight text-white mb-2">
                <img src="assets/logo.png?v=14" alt="MangaVerse Logo" class="h-16 md:h-20 w-auto max-w-[280px] object-contain">
            </a>
            <p class="text-gray-300 text-sm">Join the largest manga translation ecosystem.</p>
        </div>

        <form action="dashboard.html" class="space-y-4">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-1 text-gray-200">Username</label>
                    <input type="text" class="form-control w-full rounded-xl p-3 bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:ring-2 focus:ring-manga-primary focus:border-transparent transition-all outline-none" placeholder="manga_fan" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1 text-gray-200">Email address</label>
                    <input type="email" class="form-control w-full rounded-xl p-3 bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:ring-2 focus:ring-manga-primary focus:border-transparent transition-all outline-none" placeholder="name@example.com" required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="relative">
                    <label class="block text-sm font-semibold mb-1 text-gray-200">Password</label>
                    <div class="relative">
                        <input type="password" id="reg-password" class="form-control w-full rounded-xl p-3 bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:ring-2 focus:ring-manga-primary focus:border-transparent transition-all outline-none pr-12" placeholder="••••••••" required>
                        <button type="button" onclick="togglePassword('reg-password', 'eye-icon-1')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition-colors">
                            <svg id="eye-icon-1" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="relative">
                    <label class="block text-sm font-semibold mb-1 text-gray-200">Confirm Password</label>
                    <div class="relative">
                        <input type="password" id="confirm-password" class="form-control w-full rounded-xl p-3 bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:ring-2 focus:ring-manga-primary focus:border-transparent transition-all outline-none pr-12" placeholder="••••••••" required>
                        <button type="button" onclick="togglePassword('confirm-password', 'eye-icon-2')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition-colors">
                            <svg id="eye-icon-2" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Role Selection -->
            <div>
                <label class="block text-sm font-semibold mb-2 text-gray-200">I want to join as a...</label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="cursor-pointer border border-white/20 rounded-xl p-3 flex flex-col items-center bg-white/5 hover:bg-white/10 transition-colors focus-within:ring-2 focus-within:ring-manga-primary focus-within:border-transparent">
                        <input type="radio" name="role" value="reader" class="sr-only" checked onchange="localStorage.setItem('mangaverse_role', 'reader')">
                        <span class="text-2xl mb-1">📚</span>
                        <span class="text-sm font-semibold text-white">Reader</span>
                    </label>
                    <label class="cursor-pointer border border-white/20 rounded-xl p-3 flex flex-col items-center bg-white/5 hover:bg-white/10 transition-colors focus-within:ring-2 focus-within:ring-manga-primary focus-within:border-transparent">
                        <input type="radio" name="role" value="translator" class="sr-only" onchange="localStorage.setItem('mangaverse_role', 'translator')">
                        <span class="text-2xl mb-1">✍️</span>
                        <span class="text-sm font-semibold text-white">Translator</span>
                    </label>
                    <label class="cursor-pointer border border-white/20 rounded-xl p-3 flex flex-col items-center bg-white/5 hover:bg-white/10 transition-colors focus-within:ring-2 focus-within:ring-manga-primary focus-within:border-transparent">
                        <input type="radio" name="role" value="editor" class="sr-only" onchange="localStorage.setItem('mangaverse_role', 'editor')">
                        <span class="text-2xl mb-1">🧼</span>
                        <span class="text-sm font-semibold text-white">Cleaner/Editor</span>
                    </label>
                    <label class="cursor-pointer border border-white/20 rounded-xl p-3 flex flex-col items-center bg-white/5 hover:bg-white/10 transition-colors focus-within:ring-2 focus-within:ring-manga-primary focus-within:border-transparent">
                        <input type="radio" name="role" value="admin" class="sr-only" onchange="localStorage.setItem('mangaverse_role', 'admin')">
                        <span class="text-2xl mb-1">🌟</span>
                        <span class="text-sm font-semibold text-white">Team Admin</span>
                    </label>
                </div>
                <!-- Mini inline JS strictly to save the simulated role upon submission to show dashboard correctly -->
                <script>
                    document.querySelector('form').addEventListener('submit', function() {
                        const selectedRole = document.querySelector('input[name="role"]:checked').value;
                        localStorage.setItem('mangaverse_role', selectedRole);
                    });
                </script>
            </div>
            
            <div class="flex items-center gap-2 text-sm text-gray-300 mt-2">
                <input type="checkbox" id="terms" class="rounded text-manga-primary focus:ring-manga-primary border-gray-500 bg-white/10 w-4 h-4 cursor-pointer" required>
                <label for="terms" class="cursor-pointer">I agree to the <a href="#" class="text-manga-primary hover:underline">Terms of Service</a> & <a href="#" class="text-manga-primary hover:underline">Privacy Policy</a>.</label>
            </div>

            <button type="submit" class="w-full bg-manga-primary hover:bg-purple-700 text-white py-3 rounded-xl font-bold shadow-manga transition-all transform hover:scale-[1.02] mt-4">Create Account</button>
            
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#1a1a1a] px-2 text-gray-500">Or join with</span></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button type="button" class="flex items-center justify-center gap-2 py-2.5 border border-white/20 rounded-xl hover:bg-white/5 transition-all text-sm font-medium text-white">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Google
                </button>
                <button type="button" class="flex items-center justify-center gap-2 py-2.5 border border-white/20 rounded-xl hover:bg-white/5 transition-all text-sm font-medium text-white">
                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
                        <path d="M17.05 20.28c-.98.95-2.05 1.61-3.23 1.61-1.15 0-1.54-.69-2.83-.69-1.31 0-1.74.67-2.83.67-1.12 0-2.22-.72-3.32-1.76C3.51 18.77 2 15.99 2 13.1c0-4.63 3.01-7.06 5.86-7.06 1.5 0 2.65.91 3.52.91.86 0 1.95-.91 3.55-.91 1.15 0 2.21.37 3.01.99-2.4 2.17-2.03 5.4 1 6.8-.75 2-1.63 3.94-2.89 5.45zM12.03 5.98c-.18-2.23 1.74-4.07 3.84-4.58.5 2.51-2.06 4.77-3.84 4.58z"/>
                    </svg>
                    Apple
                </button>
            </div>
        </form>

        <p class="text-center text-sm text-gray-400 mt-6">
            Already have an account? <a href="login.html" class="text-manga-primary font-bold hover:text-purple-400 transition-colors">Log in</a>
        </p>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.024 10.024 0 014.132-5.403m2.134-1.162A10.016 10.016 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.403m-2.134 1.162L3 3m18 18l-1.844-1.844m-5.326-5.326a3 3 0 11-4.243-4.243m4.243 4.243L9.878 9.878"></path>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
            }
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaVerse | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { 'manga-primary': '#9333ea' } } } }
    </script>
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="antialiased bg-gray-50 flex items-center justify-center min-h-screen relative overflow-hidden transition-colors" id="login-body">
    
    <!-- Background -->
    <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 bg-gradient-to-br from-indigo-900/90 to-black z-10"></div>
        <img src="https://images.unsplash.com/photo-1541562232579-512a21360020?w=1920" class="w-full h-full object-cover" alt="Background">
    </div>

    <!-- Register Card -->
    <div class="glass-panel w-full max-w-lg p-8 rounded-3xl shadow-2xl z-20 mx-4 border border-white/20 slide-down bg-white/10 dark:bg-black/40 backdrop-blur-xl my-8">
        <div class="text-center mb-6">
            <a href="index.html" class="inline-flex items-center gap-2 text-2xl font-bold tracking-tight text-white mb-2">
                <img src="assets/logo.png?v=14" alt="MangaVerse Logo" class="h-20 md:h-24 w-auto max-w-[300px] object-contain">
            </a>
            <p class="text-gray-300 text-sm">Join the largest manga translation ecosystem.</p>
        </div>

        <form action="dashboard.html" class="space-y-4">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-1 text-gray-200">Username</label>
                    <input type="text" class="form-control w-full rounded-xl p-3 bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:ring-2 focus:ring-manga-primary focus:border-transparent transition-all outline-none" placeholder="manga_fan" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1 text-gray-200">Email address</label>
                    <input type="email" class="form-control w-full rounded-xl p-3 bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:ring-2 focus:ring-manga-primary focus:border-transparent transition-all outline-none" placeholder="name@example.com" required>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-1 text-gray-200">Password</label>
                    <input type="password" class="form-control w-full rounded-xl p-3 bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:ring-2 focus:ring-manga-primary focus:border-transparent transition-all outline-none" placeholder="••••••••" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1 text-gray-200">Confirm Password</label>
                    <input type="password" class="form-control w-full rounded-xl p-3 bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:ring-2 focus:ring-manga-primary focus:border-transparent transition-all outline-none" placeholder="••••••••" required>
                </div>
            </div>

            <!-- Role Selection -->
            <div>
                <label class="block text-sm font-semibold mb-2 text-gray-200">I want to join as a...</label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="cursor-pointer border border-white/20 rounded-xl p-3 flex flex-col items-center bg-white/5 hover:bg-white/10 transition-colors focus-within:ring-2 focus-within:ring-manga-primary focus-within:border-transparent">
                        <input type="radio" name="role" value="reader" class="sr-only" checked onchange="localStorage.setItem('mangaverse_role', 'reader')">
                        <span class="text-2xl mb-1">📚</span>
                        <span class="text-sm font-semibold text-white">Reader</span>
                    </label>
                    <label class="cursor-pointer border border-white/20 rounded-xl p-3 flex flex-col items-center bg-white/5 hover:bg-white/10 transition-colors focus-within:ring-2 focus-within:ring-manga-primary focus-within:border-transparent">
                        <input type="radio" name="role" value="translator" class="sr-only" onchange="localStorage.setItem('mangaverse_role', 'translator')">
                        <span class="text-2xl mb-1">✍️</span>
                        <span class="text-sm font-semibold text-white">Translator</span>
                    </label>
                    <label class="cursor-pointer border border-white/20 rounded-xl p-3 flex flex-col items-center bg-white/5 hover:bg-white/10 transition-colors focus-within:ring-2 focus-within:ring-manga-primary focus-within:border-transparent">
                        <input type="radio" name="role" value="editor" class="sr-only" onchange="localStorage.setItem('mangaverse_role', 'editor')">
                        <span class="text-2xl mb-1">🧼</span>
                        <span class="text-sm font-semibold text-white">Cleaner/Editor</span>
                    </label>
                    <label class="cursor-pointer border border-white/20 rounded-xl p-3 flex flex-col items-center bg-white/5 hover:bg-white/10 transition-colors focus-within:ring-2 focus-within:ring-manga-primary focus-within:border-transparent">
                        <input type="radio" name="role" value="admin" class="sr-only" onchange="localStorage.setItem('mangaverse_role', 'admin')">
                        <span class="text-2xl mb-1">🌟</span>
                        <span class="text-sm font-semibold text-white">Team Admin</span>
                    </label>
                </div>
                <!-- Mini inline JS strictly to save the simulated role upon submission to show dashboard correctly -->
                <script>
                    document.querySelector('form').addEventListener('submit', function() {
                        const selectedRole = document.querySelector('input[name="role"]:checked').value;
                        localStorage.setItem('mangaverse_role', selectedRole);
                    });
                </script>
            </div>
            
            <div class="flex items-center gap-2 text-sm text-gray-300 mt-2">
                <input type="checkbox" id="terms" class="rounded text-manga-primary focus:ring-manga-primary border-gray-500 bg-white/10 w-4 h-4 cursor-pointer" required>
                <label for="terms" class="cursor-pointer">I agree to the <a href="#" class="text-manga-primary hover:underline">Terms of Service</a> & <a href="#" class="text-manga-primary hover:underline">Privacy Policy</a>.</label>
            </div>

            <button type="submit" class="w-full bg-manga-primary hover:bg-purple-700 text-white py-3 rounded-xl font-bold shadow-manga transition-all transform hover:scale-[1.02] mt-4">Create Account</button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-6">
            Already have an account? <a href="login.html" class="text-manga-primary font-bold hover:text-purple-400 transition-colors">Log in</a>
        </p>
    </div>

</body>
</html>

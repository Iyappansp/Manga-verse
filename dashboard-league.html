<!DOCTYPE html>
<html lang="en" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaVerse | Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { 'manga-primary': '#9333ea' } } } }
    </script>
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="assets/css/dark-mode.css" rel="stylesheet">
    <link href="assets/css/rtl.css" rel="stylesheet">
</head>
<body class="antialiased bg-gray-50 dark:bg-gray-950 overflow-hidden">
    <!-- Navbar (Static for sub-pages) -->
    <nav class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 fixed top-0 w-full z-50 h-16 flex items-center justify-between px-4 sm:px-6">
        <div class="flex items-center gap-4">
            <button id="sidebar-toggle" class="p-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg md:hidden">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <a href="index.html" class="flex items-center gap-2 group">
                <img src="assets/logo.png?v=14" alt="MangaVerse Logo" class="h-12 md:h-16 w-auto max-w-[250px] object-contain group-hover:rotate-12 transition-transform shadow-lg shadow-manga-primary/20 rounded-lg">
                <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-400">Workspace</span>
            </a>
        </div>
        
        <div class="flex items-center gap-3">
             <button id="theme-toggle" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1m-16 0H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>
                <svg class="w-5 h-5 hidden dark:block text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
             </button>
             <button id="rtl-toggle" class="px-3 py-1 text-xs font-bold bg-gray-100 dark:bg-gray-800 rounded-lg hover:bg-manga-primary hover:text-white transition-all">RTL</button>
             <div class="w-8 h-8 rounded-full bg-manga-primary/20 flex items-center justify-center">
                 <img src="https://i.pravatar.cc/100" class="w-full h-full rounded-full border border-manga-primary/50" alt="Profile">
             </div>
        </div>
    </nav>

    <div class="flex h-screen pt-16 relative">
        <div id="sidebar-placeholder" class="contents"></div>

        <main class="flex-1 overflow-y-auto p-4 sm:p-8 bg-gray-50 dark:bg-gray-950">
            <div class="max-w-4xl mx-auto">
                <div class="mb-8">
                    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Translator League</h1>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Competitive translation rankings and rewards.</p>
                </div>
            <div class="glass-panel overflow-hidden rounded-2xl">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 dark:bg-gray-900/50">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Rank</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Translator</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Chapters</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Points</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase text-right">Trend</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
                        <!-- Top 1 -->
                        <tr class="hover:bg-gray-50/50 dark:hover:bg-gray-800/50 transition-colors">
                            <td class="px-6 py-4">
                                <span class="w-8 h-8 rounded-full bg-yellow-400 text-white flex items-center justify-center font-bold shadow-lg shadow-yellow-400/20">1</span>
                            </td>
                            <td class="px-6 py-4 flex items-center gap-3">
                                <img src="https://i.pravatar.cc/150?u=12" class="w-10 h-10 rounded-full">
                                <div>
                                    <div class="font-bold text-gray-900 dark:text-white">Alex_Solo</div>
                                    <div class="text-xs text-manga-primary font-medium">Grandmaster</div>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-500 dark:text-gray-400">1,204</td>
                            <td class="px-6 py-4 text-sm font-bold text-gray-900 dark:text-white">45,820</td>
                            <td class="px-6 py-4 text-right">
                                <span class="text-green-500 text-xs font-bold">▲ 12%</span>
                            </td>
                        </tr>
                         <!-- Top 2 -->
                         <tr class="hover:bg-gray-50/50 dark:hover:bg-gray-800/50 transition-colors">
                            <td class="px-6 py-4">
                                <span class="w-8 h-8 rounded-full bg-gray-300 text-white flex items-center justify-center font-bold">2</span>
                            </td>
                            <td class="px-6 py-4 flex items-center gap-3">
                                <img src="https://i.pravatar.cc/150?u=15" class="w-10 h-10 rounded-full">
                                <div>
                                    <div class="font-bold text-gray-900 dark:text-white">MangaLover99</div>
                                    <div class="text-xs text-blue-500 font-medium">Diamond</div>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-500 dark:text-gray-400">950</td>
                            <td class="px-6 py-4 text-sm font-bold text-gray-900 dark:text-white">32,100</td>
                            <td class="px-6 py-4 text-right">
                                <span class="text-green-500 text-xs font-bold">▲ 5%</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

        <!-- Mobile Sidebar Overlay (Matches dashboard.html) -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden transition-opacity duration-300 opacity-0"></div>
    </div>

    <!-- Shared JS -->
    <script src="assets/js/main.js?v=3"></script>
    <script src="assets/js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
             // Fetch sidebar and notifications from main dashboard
             fetch('dashboard.html').then(res => res.text()).then(html => {
                 const parser = new DOMParser();
                 const doc = parser.parseFromString(html, 'text/html');
                 
                 // Inject Sidebar
                 const sidebar = doc.querySelector('#dashboard-sidebar');
                 if(sidebar) {
                     sidebar.querySelectorAll('.sidebar-item').forEach(item => {
                         item.classList.remove('bg-manga-primary/10', 'text-manga-primary');
                         if(item.innerText.includes('Leaderboard')) item.classList.add('bg-manga-primary/10', 'text-manga-primary');
                     });
                     document.getElementById('sidebar-placeholder').replaceWith(sidebar);
                 }

                 // Inject Notification Panel
                 const notificationPanel = doc.querySelector('#notification-panel');
                 if(notificationPanel) {
                     document.body.appendChild(notificationPanel);
                 }

                 // Initialize dashboard logic for the newly injected elements
                 if(typeof initSidebar === 'function') initSidebar();
             });
        });
    </script>
</body>
</html>
